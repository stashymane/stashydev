name: CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      production: ${{ github.ref_name == github.event.repository.default_branch }}

  deploy:
    needs: build
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      production: ${{ github.ref_name == github.event.repository.default_branch }}
